name: PR Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read

jobs:
  build-and-push:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check required secret
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "${FLY_API_TOKEN}" ]; then
            echo "::notice::FLY_API_TOKEN not set, skipping image push"
            exit 1
          fi
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            accept-flake-config = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - name: Build OCI image
        run: nix build .#oci-image
      - name: Push to Fly registry
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          IMAGE_REF: registry.fly.io/balance-preview-${{ github.event.pull_request.number }}:${{ github.event.pull_request.head.sha }}
        run: |
          nix run nixpkgs#skopeo -- copy \
            --dest-creds "x:${FLY_API_TOKEN}" \
            "docker-archive:result" \
            "docker://${IMAGE_REF}"

  trigger-preview:
    needs: build-and-push
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check required secret
        env:
          INFRA_DISPATCH_TOKEN: ${{ secrets.INFRA_DISPATCH_TOKEN }}
        run: |
          if [ -z "${INFRA_DISPATCH_TOKEN}" ]; then
            echo "::notice::INFRA_DISPATCH_TOKEN not set, skipping dispatch"
            exit 1
          fi
      - uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          IMAGE_REF: registry.fly.io/balance-preview-${{ github.event.pull_request.number }}:${{ github.event.pull_request.head.sha }}
        with:
          github-token: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'gunk-dev',
              repo: 'infra',
              event_type: 'balance-preview',
              client_payload: {
                pr_number: process.env.PR_NUMBER,
                image: process.env.IMAGE_REF
              }
            });

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check required secret
        env:
          INFRA_DISPATCH_TOKEN: ${{ secrets.INFRA_DISPATCH_TOKEN }}
        run: |
          if [ -z "${INFRA_DISPATCH_TOKEN}" ]; then
            echo "::notice::INFRA_DISPATCH_TOKEN not set, skipping dispatch"
            exit 1
          fi
      - uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          github-token: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'gunk-dev',
              repo: 'infra',
              event_type: 'balance-preview-cleanup',
              client_payload: {
                pr_number: process.env.PR_NUMBER
              }
            });
