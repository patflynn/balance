name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build -w client
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: client/dist
      - uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
        id: deployment

  build-and-push-staging:
    needs: deploy
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
    outputs:
      pushed: ${{ steps.check.outputs.has_secret }}
    steps:
      - name: Check required secret
        id: check
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "${FLY_API_TOKEN}" ]; then
            echo "::notice::FLY_API_TOKEN not set, skipping image push"
            echo "has_secret=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_secret=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: steps.check.outputs.has_secret == 'true'
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
        if: steps.check.outputs.has_secret == 'true'
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            accept-flake-config = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - name: Build OCI image
        if: steps.check.outputs.has_secret == 'true'
        run: nix build .#oci-image
      - name: Push to Fly registry
        if: steps.check.outputs.has_secret == 'true'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          IMAGE_REF: registry.fly.io/balance-staging:${{ github.sha }}
        run: |
          nix run nixpkgs#skopeo -- copy \
            --dest-creds "x:${FLY_API_TOKEN}" \
            "docker-archive:result" \
            "docker://${IMAGE_REF}"

  trigger-staging:
    needs: build-and-push-staging
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: staging
    if: github.event_name == 'push' && needs.build-and-push-staging.outputs.pushed == 'true'
    steps:
      - name: Check required secret
        id: check
        env:
          INFRA_DISPATCH_TOKEN: ${{ secrets.INFRA_DISPATCH_TOKEN }}
        run: |
          if [ -z "${INFRA_DISPATCH_TOKEN}" ]; then
            echo "::notice::INFRA_DISPATCH_TOKEN not set, skipping dispatch"
            echo "has_secret=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_secret=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        if: steps.check.outputs.has_secret == 'true'
        env:
          IMAGE_REF: registry.fly.io/balance-staging:${{ github.sha }}
        with:
          github-token: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'gunk-dev',
              repo: 'infra',
              event_type: 'balance-staging',
              client_payload: {
                image: process.env.IMAGE_REF
              }
            });
